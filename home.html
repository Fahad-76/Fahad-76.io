    <!--creating a slideshow with pics -->
    <div class = "slideshow-container">
        <div class = "myslides Fade" >
            <img src = "womens.jpg" class = "slide-img" style = "width:100%" >
            <div class = "caption">
            </div>
        </div>
        <div class = "myslides Fade" >
            <img src = "mens.jpg" class = "slide-img" style="width: 100%;" >
            <div class = "caption">
        </div>
        </div>
        <div class = "myslides Fade" >
            <img src = "minis.jpg" class = "slide-img" style = "width: 100%;" >
            <div class = "caption">
        </div>
        </div>
            <a class = "prev" onclick="plusSlides(-1)" > &#10094 </a>
            <a class = "next" onclick="plusSlides(1)" > &#10095 </a>
        </div>
        <br>

        <div class = "dot-container">
            <span class = "dot" onclick="currentSlide(1)"></span>
            <span class = "dot" onclick="currentSlide(2)"></span>
            <span class = "dot" onclick="currentSlide(3)"></span>
        </div>

        <!--styling starting with the slideshow-->
        <style>
            .slideshow-container{
                max-width: 100%;
                height: 100vh;
                position: relative;
                margin: auto;
            }

            .myslides{
                display: none;
            }

            .prev, .next {
                cursor: pointer;
                position: absolute;
                top: 50%;
                width: auto;
                margin-top: -22px;
                padding: 16px;
                color: white;
                font-weight: bold;
                font-size: 18px;
                transition: 0.6s ease;
                border-radius: 0 3px 3px 0;
                user-select: none;
            }

            .next{
                right: 0;
                border-radius: 3px 0 0 3px;
            }

            .prev:hover, .next:hover{
                background-color: rgba(0,0,0,0.8);
            }

            .button{
                color: #f2f2f2;
                font-size: 15px;
                padding: 8px 12px;
                position: absolute;
                bottom: 8px;
                width: 100%;
                text-align: center;
            }

            .slide-img {
                width: 100%;
                height: 450px;         
                object-fit: cover;      
                    }
            .caption {
                position: absolute;
                bottom: 60px;        
                left: 50%;
                transform: translateX(-50%);
                text-align: center;
                }

            .fade{
                animation: fade;
                animation-duration: 1.5s;
            }

            @keyframes fade{
                from{opacity: 0.4}
                to{opacity: 1;}
            }

            .topnav {
                display: flex;
                align-items: center;
                background-color: darkblue;
                height: 60px;
                padding: 0 20px;
                position: relative;
                }

            .topnav a {
                color: #f2f2f2;
                text-align: center;
                padding: 0 16px;
                text-decoration: none;
                font-size: 17px;
                line-height: 60px;
                }

            .topnav a:hover {
                background-color: red;
                color: black;
                }

            .topnav a.active {
                background-color: darkblue;
                color: white;
                }

            .topnav a.logo {
                padding: 0; 
                margin-right: 20px; 
                }

            .topnav a.logo img {
                height: 60px;
                width: auto;
                display: block;
                }

            .dropdown {
                position: relative;
            }

            .dropdown .dropbtn {
                font-size: 16px;
                border: none;
                outline: none;
                color: white;
                padding: 14px 16px;
                background-color: inherit;
                font-family: inherit;
                margin: 0;
            }

            .topnav a:hover, .dropdown:hover .dropbtn{
                background-color: red;
            }

            .dropdown-content{
                display: none;
                position: absolute;
                background-color:darkblue;
                min-width: 160px;
                box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
                z-index: 1;
            }

            .dropdown-content a{
                float: none;
                color:white;
                padding: 12px 16px;
                text-decoration: none;
                display: block;
                text-align: left;
            }

            .dropdown-content a:hover{
                background-color:red;
            }
            .dropdown:hover .dropdown-content{
                display: block;
            }

             </style>


        <script>
            let slideIndex = 1;
            showSlides(slideIndex);

            function plusSlides(n){
                showSlides(slideIndex+=n);
            }
            function currentSlide(n){
                showSlides(slideIndex = n);
            }
            
            function showSlides(n){
                let i;
                let slides = document.getElementsByClassName("myslides");
                let dots = document.getElementsByClassName("dot");
                if(n>slides.length){slideIndex=1};
                if(n<1){slideIndex = slides.length};
                for(i=0; i < slides.length; i++){
                    slides[i].style.display = "none";
                }
                for(i=0; i < dots.length; i++){
                    dots[i].className = dots[i].className.replace(" active", "");
                }
                slides[slideIndex-1].style.display = "block";
                dots[slideIndex-1].className += " active";
            }
            function autoSlides(){
                 slideIndex++;
                 showSlides(slideIndex);
                 setTimeout(autoSlides, 2000);
                        }
                 autoSlides(); // start auto slideshow

          </script>
